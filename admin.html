<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel ★ Squish Squad</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚙️</text></svg>">
</head>
<body>

  <div class="sparkle">✨</div>
  <div class="sparkle">⭐</div>
  <div class="sparkle">💎</div>
  <div class="butterfly">🦋</div>
  <div class="butterfly">🦋</div>

  <nav class="navbar">
    <div class="logo"><span class="star">★</span> SQUISH SQUAD</div>
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="nav_home">Home</a></li>
      <li><a href="shop.html" data-i18n="nav_shop">Shop</a></li>
      <li><a href="mystery.html" data-i18n="nav_mystery">Mystery</a></li>
      <li><button class="nav-links lang-toggle" type="button"><span class="globe">🌐</span><span class="lang-label">عربي</span></button></li>
      <li><a href="#" class="cart-button">🛒 <span class="cart-count" id="cartCount">0</span></a></li>
    </ul>
  </nav>

  <h1 class="section-title" style="margin-top: 40px;">⚙️ <span class="holo" data-i18n="admin_title">Control Panel</span> ⚙️</h1>
  <p class="section-subtitle" data-i18n="admin_subtitle">Boss mode ★ Add, edit &amp; delete your squishies</p>

  <div class="admin-wrap">

    <div class="admin-panel">
      <h2 id="formTitle" data-i18n="admin_form_title_add">+ Add New Squish</h2>
      <form id="productForm">
        <input type="hidden" id="productId">

        <div class="form-row">
          <label for="productName" data-i18n="admin_label_name">Name</label>
          <input type="text" id="productName" placeholder="e.g. Galaxy Nee Doh" required>
        </div>

        <div class="form-row">
          <label for="productNameAr" data-i18n="admin_label_name_ar">Name in Arabic (optional)</label>
          <input type="text" id="productNameAr" placeholder="مثال: ني-دوه المجرة" dir="rtl">
        </div>

        <div class="form-row">
          <label for="productPrice" data-i18n="admin_label_price">Price (AED)</label>
          <input type="number" id="productPrice" step="1" min="0" placeholder="35" required>
        </div>

        <div class="form-row">
          <label data-i18n="admin_label_photo">Photo</label>
          <div id="photoSlot">
            <label class="photo-upload" id="photoUpload">
              <span class="photo-upload-icon">📸</span>
              <span class="photo-upload-text">
                <span data-i18n="admin_photo_upload_text">Click or drop a photo</span>
                <span class="small" data-i18n="admin_photo_upload_small">JPG / PNG · auto-resized</span>
              </span>
              <input type="file" id="productPhotoFile" accept="image/*">
            </label>
          </div>
          <input type="hidden" id="productImage">
        </div>

        <div class="form-row">
          <label for="productEmoji" data-i18n="admin_label_emoji">Emoji (shows if no photo)</label>
          <input type="text" id="productEmoji" placeholder="🦄" maxlength="4" required>
        </div>

        <div class="form-row">
          <label for="productDesc" data-i18n="admin_label_desc">Description</label>
          <textarea id="productDesc" placeholder="Stretchy + scented + super cute!" required></textarea>
        </div>

        <div class="form-row">
          <label for="productDescAr" data-i18n="admin_label_desc_ar">Description in Arabic (optional)</label>
          <textarea id="productDescAr" placeholder="مطاطي + معطر + كيوت!" dir="rtl"></textarea>
        </div>

        <div class="form-row">
          <label data-i18n="admin_label_color">Color</label>
          <div class="color-picker" id="colorPicker">
            <div class="color-swatch selected" data-color="pink" title="Pink"></div>
            <div class="color-swatch" data-color="blue" title="Blue"></div>
            <div class="color-swatch" data-color="lime" title="Lime"></div>
            <div class="color-swatch" data-color="yellow" title="Yellow"></div>
            <div class="color-swatch" data-color="purple" title="Purple"></div>
            <div class="color-swatch" data-color="orange" title="Orange"></div>
            <div class="color-swatch" data-color="rainbow" title="Holo" style="grid-column: span 2;"></div>
          </div>
          <input type="hidden" id="productColor" value="pink">
        </div>

        <div class="form-row">
          <label for="productBadge" data-i18n="admin_label_badge">Badge (optional)</label>
          <select id="productBadge">
            <option value="" data-i18n="badge_none">No badge</option>
            <option value="new" data-i18n="badge_new">NEW! ✨</option>
            <option value="viral" data-i18n="badge_viral">VIRAL 🔥</option>
            <option value="hot" data-i18n="badge_hot">HOT 🔥</option>
            <option value="holo" data-i18n="badge_limited">LIMITED ★</option>
          </select>
        </div>

        <div class="form-row">
          <label for="productCategory" data-i18n="admin_label_category">Category</label>
          <select id="productCategory">
            <option value="needoh" data-i18n="cat_needoh">Nee Doh</option>
            <option value="mystery" data-i18n="cat_mystery">Mystery</option>
            <option value="cute" data-i18n="cat_cute">Cute</option>
            <option value="needoh viral" data-i18n="cat_needoh_viral">Nee Doh + Viral</option>
            <option value="mystery viral" data-i18n="cat_mystery_viral">Mystery + Viral</option>
            <option value="cute viral" data-i18n="cat_cute_viral">Cute + Viral</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-pink" id="submitBtn" data-i18n="admin_btn_add">Add Squish ✨</button>
          <button type="button" class="btn btn-yellow" id="cancelBtn" style="display: none;" data-i18n="admin_btn_cancel">Cancel</button>
        </div>
      </form>

      <div style="margin-top: 20px; padding-top: 16px; border-top: 3px dashed var(--jet-black); display: flex; flex-direction: column; gap: 8px;">
        <button type="button" class="btn btn-purple" id="resetBtn" style="font-size: 12px; padding: 10px;" data-i18n="admin_btn_reset">↺ Reset to Defaults</button>
      </div>
    </div>

    <div>
      <h2 style="font-family: 'Bungee', sans-serif; color: var(--cyber-lime); text-transform: uppercase; margin-bottom: 20px; text-shadow: 2px 2px 0 var(--jet-black); letter-spacing: 1px;">
        🛍️ <span data-i18n="admin_all_products">All Products</span> <span id="productCount" style="color: var(--neon-pink);">(0)</span>
      </h2>
      <div class="admin-products" id="adminProducts"></div>
    </div>

  </div>

  <footer class="footer">
    <div class="rainbow-bar"></div>
    <p data-i18n="footer_made_by">Made with 💖 by Rawda ★ Squish Squad © 2026</p>
    <p style="margin-top: 8px; opacity: 0.7; font-size: 12px;" data-i18n="admin_footer_hint">Admin mode ⚙️ ★ All changes save instantly to your browser</p>
  </footer>

  <div class="toast" id="toast">Saved! 💖</div>

  <script src="script.js"></script>
</body>
</html>
